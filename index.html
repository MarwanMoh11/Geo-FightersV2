<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>GeoFighters</title>
    <meta
      name="description"
      content="A high-performance 3D arcade shooter. Survive the neon horde."
    />

    <!-- Favicons (relative paths so portal-hosted builds resolve correctly) -->
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="./icons/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#040410" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GeoFighters" />
  </head>

  <body>
    <div id="app"></div>

    <!-- Loading Screen (shown during asset preload) -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-title">GEOFIGHTERS</div>
        <div class="loading-subtitle">INITIALIZING SYSTEMS</div>
        <div class="loading-bar-container">
          <div id="loading-bar-fill"></div>
        </div>
        <div id="loading-text">Loading assets...</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
