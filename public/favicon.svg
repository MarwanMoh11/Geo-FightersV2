<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0c1228"/>
      <stop offset="100%" stop-color="#040410"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g filter="url(#glow)" fill="none" stroke-linejoin="round">
    <polygon points="32,9 51,20 51,44 32,55 13,44 13,20"
             stroke="#00e5ff" stroke-width="2.6"/>
    <polygon points="32,24 41,40 23,40"
             stroke="#ff2e88" stroke-width="2.4"/>
  </g>
</svg>
